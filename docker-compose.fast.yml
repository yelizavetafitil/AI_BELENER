# Production: tile OCR + локальная текстовая модель для отчёта.
#   docker compose -f docker-compose.yml -f docker-compose.fast.yml up -d --force-recreate web
#   docker compose exec ollama ollama pull gemma3:4b

services:
  web:
    environment:
      PDF_TILE_OCR_DPI: ${PDF_TILE_OCR_DPI:-320}
      PDF_TILE_OCR_TIME_BUDGET: ${PDF_TILE_OCR_TIME_BUDGET:-150}
      PDF_TILE_OCR_OVERLAP: ${PDF_TILE_OCR_OVERLAP:-0.12}
      PDF_REPORT_LLM: ${PDF_REPORT_LLM:-1}
      PDF_REPORT_LLM_MODEL: ${PDF_REPORT_LLM_MODEL:-qwen2.5vl:7b}
      PDF_REPORT_LLM_TIMEOUT: ${PDF_REPORT_LLM_TIMEOUT:-180}
      MODEL_DEFAULT: ${MODEL_DEFAULT:-qwen2.5vl:7b}
