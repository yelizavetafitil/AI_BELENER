# БелнипиAI — http://localhost:8090
# Память: лимиты + резерв через переменные в .env (см. .env.example)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: ${DB_MEM_LIMIT:-1024m}
    mem_reservation: ${DB_MEM_RESERVATION:-256m}
    environment:
      POSTGRES_USER: belener
      POSTGRES_PASSWORD: belener
      POSTGRES_DB: belnipiai
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - belnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U belener -d belnipiai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Vision/LLM — только с профилем: docker compose --profile ollama up -d
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    restart: unless-stopped
    mem_limit: ${OLLAMA_MEM_LIMIT:-8g}
    mem_reservation: ${OLLAMA_MEM_RESERVATION:-2g}
    environment:
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_PARALLEL: "1"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - belnet

  web:
    build: .
    restart: unless-stopped
    mem_limit: ${WEB_MEM_LIMIT:-6g}
    mem_reservation: ${WEB_MEM_RESERVATION:-1536m}
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-8090}:5000"
    environment:
      DATABASE_URL: postgresql://belener:belener@db:5432/belnipiai
      OLLAMA_HOST: http://ollama:11434
      EDOCR_URL: ${EDOCR_URL:-}
      DEEPSEEK_OCR_URL: ${DEEPSEEK_OCR_URL:-}
      SURYA_OCR_URL: ${SURYA_OCR_URL:-}
      PADDLE_OCR_URL: ${PADDLE_OCR_URL:-}
      PDF_OCR_PADDLE_ZONES: ${PDF_OCR_PADDLE_ZONES:-0}
      PDF_YOLO_ZONES: ${PDF_YOLO_ZONES:-0}
      PDF_YOLO_MODEL: ${PDF_YOLO_MODEL:-}
      PDF_OCR_ENGINE: ${PDF_OCR_ENGINE:-tesseract}
    volumes:
      - ./:/workspace:ro
      - ./belener:/app/belener:ro
      - ./app.py:/app/app.py:ro
      - ./scripts:/app/scripts:ro
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
        required: false
    networks:
      - belnet

  edocr:
    profiles: ["edocr"]
    build: ./services/edocr
    restart: unless-stopped
    mem_limit: ${EDOCR_MEM_LIMIT:-4g}
    mem_reservation: ${EDOCR_MEM_RESERVATION:-512m}
    ports:
      - "${EDOCR_PORT:-5001}:5001"
    networks:
      - belnet

networks:
  belnet:
    driver: bridge

volumes:
  pg_data:
  ollama_data:
